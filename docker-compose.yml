# Top-level orchestration for the Quantum Secure Lab.
# Single command from this directory:
#
#     docker compose up --build
#
# Per-folder docker-compose.yml files still work for running each
# component in isolation (provided quantum-net already exists).
name: quantum-lab
services:
  # ---- Core infrastructure ---------------------------------------------------
  radius01:
    extends:
      file: ./RADIUS/docker-compose.yml
      service: radius01
    build:
      context: ./RADIUS
      dockerfile: Dockerfile
  qconnect:
    extends:
      file: ./QConnect/docker-compose.yml
      service: qconnect
    build:
      context: ./QConnect
      dockerfile: Dockerfile
  # ---- Per-supplicant NAS instances ------------------------------------------
  # Each supplicant has its own radius-client. Both forward to radius01.
  client-radiusclient:
    extends:
      file: ./CLIENT/docker-compose.yml
      service: client-radiusclient
    build:
      context: ./RADIUS_CLIENT
      dockerfile: Dockerfile
    depends_on:
      - radius01
  server-radiusclient:
    extends:
      file: ./SERVER/docker-compose.yml
      service: server-radiusclient
    build:
      context: ./RADIUS_CLIENT
      dockerfile: Dockerfile
    depends_on:
      - radius01
  # ---- Application server / client ------------------------------------------
  server01:
    extends:
      file: ./SERVER/docker-compose.yml
      service: server01
    build:
      context: ./SERVER
      dockerfile: Dockerfile
    depends_on:
      qconnect:
        condition: service_started
      server-radiusclient:
        condition: service_healthy
  client01:
    extends:
      file: ./CLIENT/docker-compose.yml
      service: client01
    build:
      context: ./CLIENT
      dockerfile: Dockerfile
    depends_on:
      qconnect:
        condition: service_started
      client-radiusclient:
        condition: service_healthy
      server01:
        condition: service_healthy
  # ---- Browser tooling -------------------------------------------------------
  radius-ui:
    extends:
      file: ./RADIUS_UI/docker-compose.yml
      service: radius-ui
    build:
      context: ./RADIUS_UI
      dockerfile: Dockerfile
    depends_on:
      - radius01
networks:
  quantum-net:
    name: quantum-net
    driver: bridge
volumes:
  server01-certs:
  qconnect-data:
