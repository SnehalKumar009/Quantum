# Top-level orchestration for the Quantum Secure Lab (POC).
#
# PREREQUISITE: create the shared Docker network ONCE before running this:
#   docker network create quantum-net
#
# Then from this folder:
#   docker compose up --build
#
# Per-folder docker-compose.yml files still work for running each
# component in isolation, in this order:
#   RADIUS_CLIENT -> RADIUS -> QConnect -> SERVER -> CLIENT
name: quantum-lab

services:
  # ---- Core RADIUS server ----------------------------------------------------
  radius01:
    extends:
      file: ./RADIUS/docker-compose.yml
      service: radius01
    build:
      context: ./RADIUS
      dockerfile: Dockerfile

  # ---- Per-supplicant NAS instances (defined in RADIUS_CLIENT/) -------------
  # NOTE: The NASes do NOT depend_on radius01 — they only contact it lazily
  # when /auth is invoked, and their healthcheck hits their own /healthz.
  # Keeping them independent matches the documented startup order:
  #   RADIUS_CLIENT -> RADIUS -> QConnect -> SERVER -> CLIENT
  client-radiusclient:
    extends:
      file: ./RADIUS_CLIENT/docker-compose.yml
      service: client-radiusclient
    build:
      context: ./RADIUS_CLIENT
      dockerfile: Dockerfile

  server-radiusclient:
    extends:
      file: ./RADIUS_CLIENT/docker-compose.yml
      service: server-radiusclient
    build:
      context: ./RADIUS_CLIENT
      dockerfile: Dockerfile

  # ---- Key service -----------------------------------------------------------
  qconnect:
    extends:
      file: ./QConnect/docker-compose.yml
      service: qconnect
    build:
      context: ./QConnect
      dockerfile: Dockerfile

  # ---- Application server / client ------------------------------------------
  server01:
    extends:
      file: ./SERVER/docker-compose.yml
      service: server01
    build:
      context: ./SERVER
      dockerfile: Dockerfile
    depends_on:
      qconnect:
        condition: service_started
      server-radiusclient:
        condition: service_healthy

  client01:
    extends:
      file: ./CLIENT/docker-compose.yml
      service: client01
    build:
      context: ./CLIENT
      dockerfile: Dockerfile
    depends_on:
      qconnect:
        condition: service_started
      client-radiusclient:
        condition: service_healthy
      server01:
        condition: service_healthy

  # ---- Browser tooling -------------------------------------------------------
  radius-ui:
    extends:
      file: ./RADIUS_UI/docker-compose.yml
      service: radius-ui
    build:
      context: ./RADIUS_UI
      dockerfile: Dockerfile
    depends_on:
      - radius01

networks:
  quantum-net:
    name: quantum-net
    external: true

volumes:
  server01-certs:
  qconnect-data:

