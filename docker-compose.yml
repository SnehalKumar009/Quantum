# Top-level orchestration for the Quantum Secure Lab.
# Runs radius01 + server01 + client01 with a single command:
#
#     docker compose up --build
#
# (the per-folder docker-compose.yml files still work for running each
# component in isolation).

name: quantum-lab

services:
  radius01:
    extends:
      file: ./RADIUS/docker-compose.yml
      service: radius01
    build:
      context: ./RADIUS
      dockerfile: Dockerfile

  qconnect:
    extends:
      file: ./QConnect/docker-compose.yml
      service: qconnect
    build:
      context: ./QConnect
      dockerfile: Dockerfile

  radius-client:
    extends:
      file: ./RADIUS_CLIENT/docker-compose.yml
      service: radius-client
    build:
      context: ./RADIUS_CLIENT
      dockerfile: Dockerfile
    depends_on:
      - radius01

  server01:
    extends:
      file: ./SERVER/docker-compose.yml
      service: server01
    build:
      context: ./SERVER
      dockerfile: Dockerfile
    depends_on:
      qconnect:
        condition: service_started
      radius-client:
        condition: service_healthy

  client01:
    extends:
      file: ./CLIENT/docker-compose.yml
      service: client01
    build:
      context: ./CLIENT
      dockerfile: Dockerfile
    depends_on:
      qconnect:
        condition: service_started
      radius-client:
        condition: service_healthy
      server01:
        condition: service_healthy

  radius-ui:
    extends:
      file: ./RADIUS_UI/docker-compose.yml
      service: radius-ui
    build:
      context: ./RADIUS_UI
      dockerfile: Dockerfile
    depends_on:
      - radius01


networks:
  quantum-net:
    name: quantum-net
    driver: bridge

volumes:
  server01-certs:
  qconnect-data:


