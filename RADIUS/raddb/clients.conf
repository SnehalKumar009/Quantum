# =============================================================================
# clients.conf - RADIUS clients (NASes allowed to send Access-Requests).
#
# POC mode: one broad entry covers any peer on the Docker bridge.
# FreeRADIUS keys client entries by source IP and forbids overlapping ranges,
# so without static IPs we can only have ONE catch-all entry here. The two
# NASes (client-radiusclient, server-radiusclient) are still distinguishable
# in logs because every Access-Request carries:
#     NAS-Identifier = "client-radiusclient-01"   or
#     NAS-Identifier = "server-radiusclient-01"
# =============================================================================

client quantum-net {
    ipaddr     = 0.0.0.0
    netmask    = 0
    secret     = testing123
    nas_type   = other
    shortname  = quantum-net-nas
    require_message_authenticator = no
}

client localhost {
    ipaddr     = 127.0.0.1
    secret     = testing123
    nas_type   = other
    require_message_authenticator = no
}

