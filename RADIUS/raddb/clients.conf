# =============================================================================
# clients.conf - RADIUS clients (NAS / devices allowed to send Access-Requests)
#
# Real NAS in this lab:
#   - radius-client      (the FastAPI NAS at hostname `radius-client`)
#
# Other entries kept for convenience (radius-ui, local radtest, future NASes).
# All on the Docker bridge `quantum-net`; tighten in production.
# =============================================================================

client radius-client {
    # The dedicated NAS that all supplicants (client01, server01) talk through.
    # Resolved by Docker DNS; FreeRADIUS still matches on the source IP so we
    # keep a permissive subnet here.
    ipaddr     = 0.0.0.0
    netmask    = 0
    secret     = testing123
    nas_type   = other
    shortname  = radius-client-01
    require_message_authenticator = no
}

client localhost {
    ipaddr     = 127.0.0.1
    secret     = testing123
    nas_type   = other
    require_message_authenticator = no
}

client docker-network {
    # Covers typical Docker bridge subnets (172.16.0.0/12)
    ipaddr     = 172.16.0.0
    netmask    = 12
    secret     = testing123
    nas_type   = other
    require_message_authenticator = no
}

