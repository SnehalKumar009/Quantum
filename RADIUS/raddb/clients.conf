# =============================================================================
# clients.conf - RADIUS clients (NAS / devices allowed to send Access-Requests)
#
# In this lab the "clients" of the RADIUS server are:
#   - client01 container
#   - server01 container
#   - host loopback (for local radtest)
#
# All of them sit on the Docker bridge network "quantum-net".
# We allow the whole Docker private range for simplicity in Phase 1.
# Tighten this in production.
# =============================================================================

client localhost {
    ipaddr     = 127.0.0.1
    secret     = testing123
    nas_type   = other
    require_message_authenticator = no
}

client docker-network {
    # Covers typical Docker bridge subnets (172.16.0.0/12)
    ipaddr     = 172.16.0.0
    netmask    = 12
    secret     = testing123
    nas_type   = other
    require_message_authenticator = no
}

client quantum-lab {
    # Covers the user-defined bridge created by docker-compose
    ipaddr     = 0.0.0.0
    netmask    = 0
    secret     = testing123
    nas_type   = other
    require_message_authenticator = no
}

