# =============================================================================
# clients.conf - RADIUS clients (NAS / devices allowed to send Access-Requests)
#
# Real NASes in this lab:
#   - client-radiusclient   (the NAS instance owned by CLIENT/, used by client01)
#   - server-radiusclient   (the NAS instance owned by SERVER/, used by server01)
#
# FreeRADIUS matches RADIUS clients by source IP. On the Docker bridge
# `quantum-net` we cannot know each container's IP ahead of time, so we keep
# a broad subnet match. Tighten in production.
# =============================================================================
client client-radiusclient {
    # NAS dedicated to client01.
    ipaddr     = 0.0.0.0
    netmask    = 0
    secret     = testing123
    nas_type   = other
    shortname  = client-radiusclient-01
    require_message_authenticator = no
}
client server-radiusclient {
    # NAS dedicated to server01.
    # (Same broad IP match - shortname is the differentiator in logs because
    # the upstream NAS sends NAS-Identifier in every request.)
    ipaddr     = 0.0.0.0
    netmask    = 0
    secret     = testing123
    nas_type   = other
    shortname  = server-radiusclient-01
    require_message_authenticator = no
}
client localhost {
    ipaddr     = 127.0.0.1
    secret     = testing123
    nas_type   = other
    require_message_authenticator = no
}
client docker-network {
    # Covers typical Docker bridge subnets (172.16.0.0/12), useful for radius-ui
    # and any ad-hoc test container on quantum-net.
    ipaddr     = 172.16.0.0
    netmask    = 12
    secret     = testing123
    nas_type   = other
    require_message_authenticator = no
}
