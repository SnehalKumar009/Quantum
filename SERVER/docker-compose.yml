services:
  server01:
    build:
      context: .
      dockerfile: Dockerfile
    image: quantum-lab/server01:latest
    container_name: server01
    hostname: server01
    restart: unless-stopped
    ports:
      - "8443:8443/tcp"
    environment:
      # ---- RADIUS settings ---------------------------------------------------
      RADIUS_HOST: radius01
      RADIUS_AUTH_PORT: "1812"
      RADIUS_SECRET: testing123
      RADIUS_USERNAME: server01
      RADIUS_PASSWORD: serverPassword
      RADIUS_NAS_IDENTIFIER: server01
      # ---- TLS listener -----------------------------------------------------
      LISTEN_HOST: "0.0.0.0"
      LISTEN_PORT: "8443"
      CERT_DIR: /app/certs
      CERT_CN: server01
      # ---- Logging ----------------------------------------------------------
      LOG_LEVEL: INFO
    volumes:
      # Persist the auto-generated TLS cert so it survives container rebuilds
      # and can optionally be shared with the client.
      - server01-certs:/app/certs
    networks:
      - quantum-net

volumes:
  server01-certs:

networks:
  quantum-net:
    name: quantum-net
    external: true

