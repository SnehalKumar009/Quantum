services:
  server01:
    build:
      context: .
      dockerfile: Dockerfile
    image: quantum-lab/server01:latest
    container_name: server01
    hostname: server01
    restart: unless-stopped
    ports:
      - "8443:8443/tcp"
    environment:
      # ---- Identity ---------------------------------------------------------
      USERNAME: server01
      PASSWORD: serverPassword
      # ---- NAS (server's dedicated radius-client, defined in RADIUS_CLIENT/) -
      NAS_URL: http://server-radiusclient:8082
      NAS_SHARED_TOKEN: lab-nas-token
      # ---- QConnect (registration on boot) ----------------------------------
      QCONNECT_URL: http://qconnect:9000
      # ---- Real qConnect (ETSI GS QKD 014) over mTLS ------------------------
      # SAE registered on qConnect VM as alias "sae-server01".
      # On startup server01 calls enc_keys against the KME, asking for a key
      # destined for the radius01 SAE (radius01 is the verifier/slave). The
      # resulting key_id + this server's own SAE_ID then ride to RADIUS as
      # the Quantum-Key-Id and Quantum-Master-SAE-ID VSAs.
      QKD_KME_URL:        "https://192.168.10.233:50555"
      QKD_SAE_ALIAS:      "sae-server01"
      QKD_PEER_SAE_ALIAS: "sae-radius01"
      # radius01's SAE_ID (UUID). Used by server01 as the slave when calling
      # /api/v1/keys/<peer>/enc_keys, and reported to RADIUS via the
      # Quantum-Master-SAE-ID VSA so RADIUS can call dec_keys for the matching
      # master (server01) on its side. Read it from the bundle's info.json:
      #   jq -r .sae_id /home/agenticai/SNEHAL_POC/sae-radius01/sae-radius01.info.json
      QKD_PEER_SAE_ID:    "62391013-687d-11f1-b7ff-525400b8fb7b"
      # Data-plane peer pin (OPTIONAL on the server side).
      #
      # The server learns the connecting client's SAE UUID dynamically from
      # the QC frame ("<client_sae_id>|<key_id>") and uses it as the slave
      # for its own enc_keys call. So this variable is NOT required for the
      # flow to work -- leave it empty to accept whichever SAE dials in.
      #
      # If set, it acts as a strict allow-list: any TLS connection whose QC
      # frame advertises a different client SAE will be rejected. Useful in
      # production to lock the server to one known supplicant.
      #
      # Look up client01's SAE UUID with:
      #   jq -r .sae_id /home/agenticai/SNEHAL_POC/sae-client01/sae-client01.info.json
      QKD_DATA_PEER_SAE_ID: "40a45fc8-687e-11f1-b7ff-525400b8fb7b"
      QKD_CERT:           "/etc/qkd/sae-server01.crt.pem"
      QKD_KEY:            "/etc/qkd/sae-server01.key.pem"
      QKD_CACERT:         "/etc/qkd/sae-server01.trusted_cas.pem"
      QKD_INFO_JSON:      "/etc/qkd/sae-server01.info.json"
      # ---- TLS listener -----------------------------------------------------
      LISTEN_HOST: "0.0.0.0"
      LISTEN_PORT: "8443"
      CERT_DIR: /app/certs
      CERT_CN: server01
      # ---- Logging ----------------------------------------------------------
      LOG_LEVEL: INFO
    volumes:
      - server01-certs:/app/certs
      # Per-SAE bundle generated on qConnect:
      #   etsi-proxy-cli tsf-layer key-retriever etsi014 create \
      #     --key-retriever-alias sae-server01 --pem --pem-dir saes
      - ${SAE_BUNDLE_DIR:-/home/agenticai/SNEHAL_POC}/sae-server01:/etc/qkd:ro
    networks:
      - quantum-net
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('127.0.0.1',8443),2); s.close()"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

volumes:
  server01-certs:

networks:
  quantum-net:
    name: quantum-net
    external: true

