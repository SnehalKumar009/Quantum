services:
  client01:
    build:
      context: .
      dockerfile: Dockerfile
    image: quantum-lab/client01:latest
    container_name: client01
    hostname: client01
    # One-shot workflow; don't auto-restart on success.
    restart: "no"
    environment:
      # ---- Identity ---------------------------------------------------------
      USERNAME: client01
      PASSWORD: clientPassword
      # ---- NAS (client's dedicated radius-client, defined in RADIUS_CLIENT/) -
      NAS_URL: http://client-radiusclient:8082
      NAS_SHARED_TOKEN: lab-nas-token
      # ---- QConnect (registration on boot) ----------------------------------
      QCONNECT_URL: http://qconnect:9000
      # ---- App server -------------------------------------------------------
      SERVER_HOST: server01
      SERVER_PORT: "8443"
      # ---- Logging ----------------------------------------------------------
      LOG_LEVEL: INFO
    networks:
      - quantum-net

networks:
  quantum-net:
    name: quantum-net
    external: true

