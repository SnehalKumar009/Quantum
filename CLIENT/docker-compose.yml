services:
  client01:
    build:
      context: .
      dockerfile: Dockerfile
    image: quantum-lab/client01:latest
    container_name: client01
    hostname: client01
    # One-shot workflow; don't auto-restart on success.
    restart: "no"
    environment:
      # ---- Identity ---------------------------------------------------------
      USERNAME: client01
      PASSWORD: clientPassword
      # ---- NAS (client's dedicated radius-client, defined in RADIUS_CLIENT/) -
      NAS_URL: http://client-radiusclient:8082
      NAS_SHARED_TOKEN: lab-nas-token
      # ---- QConnect (registration on boot) ----------------------------------
      QCONNECT_URL: http://qconnect:9000
      # ---- Real qConnect (ETSI GS QKD 014) over mTLS ------------------------
      # SAE registered on qConnect VM as alias "sae-client01".
      # Peer SAE is "sae-server01" — fill its UUID into QKD_PEER_SAE_ID once
      # you have it (cat /etc/qkd/.. on server01 host, or check info.json).
      QKD_KME_URL:        "https://192.168.10.233:50555"
      QKD_SAE_ALIAS:      "sae-client01"
      QKD_PEER_SAE_ALIAS: "sae-server01"
      QKD_PEER_SAE_ID:    ""    # e.g. "40a45fc8-687e-11f1-b7ff-525400b8fb7b"
      QKD_CERT:           "/etc/qkd/sae-client01.crt.pem"
      QKD_KEY:            "/etc/qkd/sae-client01.key.pem"
      QKD_CACERT:         "/etc/qkd/sae-client01.trusted_cas.pem"
      QKD_INFO_JSON:      "/etc/qkd/sae-client01.info.json"
      # ---- App server -------------------------------------------------------
      SERVER_HOST: server01
      SERVER_PORT: "8443"
      # ---- Manual failure-mode testing knob --------------------------------
      # Seconds to sleep between QConnect registration and NAS auth, giving
      # the operator a window to tamper with the key in QConnect:
      #   docker exec -it qconnect vi /data/keys/<KeyId>.json
      # Set to 0 to disable. NAS_HTTP_TIMEOUT must be >= this value.
      PRE_AUTH_DELAY_SECONDS: "60"
      NAS_HTTP_TIMEOUT: "120"
      # ---- Logging ----------------------------------------------------------
      LOG_LEVEL: INFO
    volumes:
      # Per-SAE bundle generated on qConnect:
      #   etsi-proxy-cli tsf-layer key-retriever etsi014 create \
      #     --key-retriever-alias sae-client01 --pem --pem-dir saes
      - ${SAE_BUNDLE_DIR:-/home/agenticai/SNEHAL_POC}/sae-client01:/etc/qkd:ro
    networks:
      - quantum-net

networks:
  quantum-net:
    name: quantum-net
    external: true

