services:
  # ---------------------------------------------------------------------------
  # NAS dedicated to client01. Same image as ../RADIUS_CLIENT, just a separate
  # instance with its own identity. Talks RADIUS upstream to radius01.
  # ---------------------------------------------------------------------------
  client-radiusclient:
    build:
      context: ../RADIUS_CLIENT
      dockerfile: Dockerfile
    image: quantum-lab/client-radiusclient:latest
    container_name: client-radiusclient
    hostname: client-radiusclient
    restart: unless-stopped
    environment:
      RADIUS_HOST: radius01
      RADIUS_AUTH_PORT: "1812"
      RADIUS_SECRET: testing123
      NAS_IDENTIFIER: client-radiusclient-01
      NAS_SHARED_TOKEN: lab-nas-token
      LOG_LEVEL: INFO
    networks:
      - quantum-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8082/healthz', timeout=2).read()"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s
  # ---------------------------------------------------------------------------
  # The client application itself. Routes its auth through client-radiusclient.
  # ---------------------------------------------------------------------------
  client01:
    build:
      context: .
      dockerfile: Dockerfile
    image: quantum-lab/client01:latest
    container_name: client01
    hostname: client01
    # One-shot workflow; don't auto-restart on success.
    restart: "no"
    environment:
      # ---- Identity ---------------------------------------------------------
      USERNAME: client01
      PASSWORD: clientPassword
      # ---- NAS (client''s own radius-client) ---------------------------------
      NAS_URL: http://client-radiusclient:8082
      NAS_SHARED_TOKEN: lab-nas-token
      # ---- QConnect (registration on boot) ----------------------------------
      QCONNECT_URL: http://qconnect:9000
      # ---- App server -------------------------------------------------------
      SERVER_HOST: server01
      SERVER_PORT: "8443"
      # ---- Logging ----------------------------------------------------------
      LOG_LEVEL: INFO
    networks:
      - quantum-net
    depends_on:
      client-radiusclient:
        condition: service_healthy
networks:
  quantum-net:
    name: quantum-net
    external: true
