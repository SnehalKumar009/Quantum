services:
  client01:
    build:
      context: .
      dockerfile: Dockerfile
    image: quantum-lab/client01:latest
    container_name: client01
    hostname: client01
    # The client is a one-shot workflow for now (auth + future TLS/quantum).
    # Keep it from auto-restarting on success.
    restart: "no"
    environment:
      # ---- Identity ----------------------------------------------------------
      USERNAME: client01
      PASSWORD: clientPassword
      # ---- NAS (radius-client) ----------------------------------------------
      NAS_URL: http://radius-client:8082
      NAS_SHARED_TOKEN: lab-nas-token
      # ---- QConnect (registration on boot) ----------------------------------
      QCONNECT_URL: http://qconnect:9000
      # ---- App server -------------------------------------------------------
      SERVER_HOST: server01
      SERVER_PORT: "8443"
      # ---- Logging ----------------------------------------------------------
      LOG_LEVEL: INFO
    networks:
      - quantum-net
    # The RADIUS server lives in ../RADIUS/docker-compose.yml and creates this
    # external network. We just attach to it here.
networks:
  quantum-net:
    name: quantum-net
    external: true

